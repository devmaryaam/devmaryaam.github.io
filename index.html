<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maryam | Portfolio</title>
<style>
body {
  margin:0; 
  font-family:Arial, Helvetica, sans-serif; 
  background:#0d0d0d; 
  color:#fff; 
  text-align:center; 
  padding:1vh 1.2vh;
  transition:0.3s;
}
h1 {font-size:2.4vh;font-weight:700;margin:0.5vh 0 0.8vh 0;}
h2 {font-size:2vh;margin:0.5vh 0;}
p {font-size:1.6vh;margin:0.4vh 0;line-height:1.3;}
.card {
  background:#1a1a1a; 
  margin:0.8vh auto; 
  width:94%; 
  max-width:460px; 
  box-shadow:0 0 10px #ff4fa3; 
  border-radius:12px; 
  padding:1vh; 
  border:2px solid #ff4fa3;
  text-align:left;
}
img {
  width:12vh; 
  height:12vh; 
  border-radius:12px; 
  border:2px solid #ff4fa3;
  object-fit:cover;
  object-position:center 25%;
}
.btn {
  border:none; 
  color:#fff; 
  padding:0.6vh 1.3vh; 
  border-radius:1.5vh; 
  font-size:1.6vh; 
  cursor:pointer; 
  margin:0.6vh 0;
  font-weight:bold;
  text-decoration:none;
  display:inline-block;
}
.toggle-btn {
  background:#ff4fa3;
  color:#fff;
}
.whatsapp{background:#25d366;}
.email{background:#ff4fa3;}
a {color:#ff4fa3;text-decoration:none;font-weight:bold;}

body.light {
  background:#ffe6f0;
  color:#111;
}
body.light .card{
  background:#fff;
  color:#111;
  box-shadow:0 3px 10px rgba(255,79,163,0.25);
}
body.light .toggle-btn{
  background:#333;
  color:#fff;
}
</style>
</head>
